version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: traffic-law-postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=traffic_law
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: always

  redis-cache:
    image: redis:7-alpine
    container_name: traffic-law-redis-cache
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    restart: always

  qdrant-server:
    image: qdrant/qdrant:latest
    container_name: traffic-law-qdrant-server
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: always

  ai-service:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: traffic-law-ai-service
    ports:
      - "8001:8001"
    volumes:
      # Mount code cho hot-reload khi phát triển
      - ./ai:/app/ai
      - ./data-ingestion:/app/data-ingestion
      - ./.env:/app/.env
    environment:
      - REDIS_URL=redis://redis-cache:6379/0
      - QDRANT_URL=http://qdrant-server:6333
      - PARENT_DICT_PATH=/app/data-ingestion/qdrant_db/parent_dict.json
      - MCP_RETRIEVAL_URL=http://mcp-retrieval:8100/mcp/sse
      - MCP_RERANK_URL=http://mcp-rerank:8200/mcp/sse
    depends_on:
      - redis-cache
      - qdrant-server
      - mcp-retrieval
      - mcp-rerank
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s

  # ── MCP Retrieval Server (BrightData SERP + Scrape + Chunking) ──────────
  mcp-retrieval:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: traffic-law-mcp-retrieval
    ports:
      - "8100:8100"
    command: python -m ai.mcp.retrieval --port 8100
    volumes:
      - ./ai:/app/ai
      - ./.env:/app/.env
    environment:
      - COHERE_API_KEY=${COHERE_API_KEY}
      - BRIGHTDATA_TOKEN=${BRIGHTDATA_TOKEN}
    restart: always

  # ── MCP Rerank Server (Cohere) ──────────────────────────────────────────
  mcp-rerank:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: traffic-law-mcp-rerank
    ports:
      - "8200:8200"
    command: python -m ai.mcp.rerank --port 8200
    volumes:
      - ./ai:/app/ai
      - ./.env:/app/.env
    environment:
      - COHERE_API_KEY=${COHERE_API_KEY}
    restart: always

  web-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: traffic-law-web-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount code cho hot-reload khi phát triển
      - ./backend:/app
      - ./.env:/app/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres-db:5432/traffic_law
      - REDIS_URL=redis://redis-cache:6379/0
      - AI_SERVICE_URL=http://ai-service:8001
    depends_on:
      - postgres-db
      - redis-cache
      - ai-service
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: traffic-law-frontend
    ports:
      - "3000:80"
    depends_on:
      - web-backend
    restart: always

volumes:
  pg-data:
  qdrant-data:

