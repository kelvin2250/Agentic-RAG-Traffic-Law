name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Kích hoạt khi push code vào main
  pull_request:
    branches:
      - main # Kích hoạt khi tạo Pull Request vào main

jobs:
  # JOB 1: CONTINUOUS INTEGRATION (CI) - KIỂM TRA CHẤT LƯỢNG CODE & CÚ PHÁP
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Syntax Check (Flake8)
        run: |
          # Kiểm tra các lỗi cú pháp nghiêm trọng (Syntax Errors, undefined names...)
          # Job sẽ FAIL ngay lập tức nếu code có lỗi cú pháp
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # Kiểm tra định dạng chuẩn PEP8 (Cảnh báo, không chặn deploy)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # JOB 2: CONTINUOUS DEPLOYMENT (CD) - TRIỂN KHAI LÊN AWS EC2
  deploy:
    needs: lint-and-test # BẮT BUỘC job CI (lint-and-test) phải PASS thì mới được chạy deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Chỉ deploy khi push code lên nhánh main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/Agentic-RAG-Traffic-Law || exit 1
            
            # Kéo mã nguồn mới nhất từ GitHub
            git pull origin main
            
            # Khởi động lại các container bằng Docker Compose
            docker compose down
            docker compose up -d --build
            
            # Dọn dẹp Docker images cũ/rác để giải phóng dung lượng ổ đĩa
            docker image prune -f
