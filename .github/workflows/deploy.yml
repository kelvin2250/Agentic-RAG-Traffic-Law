name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Syntax Check (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Install Testing dependencies
        run: |
          pip install pytest pyjwt passlib bcrypt pydantic-settings fastapi

      - name: Run Unit Tests
        env:
          PYTHONPATH: ./backend
        run: |
          pytest backend/tests/test_security.py

  deploy:
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e # Dừng ngay lập tức nếu bất kỳ lệnh nào bên dưới bị lỗi
            
            cd ~/Agentic-RAG-Traffic-Law
            
            # Kéo mã nguồn mới nhất từ GitHub
            git pull origin main
            
            # Khởi động lại các container bằng Docker Compose
            docker compose down
            docker compose up -d --build
            
            # Dọn dẹp Docker images cũ/rác để giải phóng dung lượng ổ đĩa
            docker image prune -f
